name: SGBus
options:
  bundleIdPrefix: com.alfredang
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: GU9WTSTX9M
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  SGBus:
    type: application
    platform: iOS
    sources:
      - SGBusApp
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredang.sgbus
        PRODUCT_NAME: SG Bus
        INFOPLIST_FILE: SGBusApp/Info.plist
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        UIRequiredDeviceCapabilities: arm64
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: SG Bus App Store Local
    info:
      path: SGBusApp/Info.plist
      properties:
        CFBundleDisplayName: SG Bus Live
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LTAAccountKey: "$(LTA_ACCOUNT_KEY)"
        NSLocationWhenInUseUsageDescription: "SG Bus Live uses your location to find the bus stops nearest to you."
        UIRequiredDeviceCapabilities:
          - arm64
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
